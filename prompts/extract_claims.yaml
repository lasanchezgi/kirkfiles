# Phase B — Claim extraction
# Used by pipeline/extractor.py · one transcript chunk per call.
# Model: gpt-4o · direct JSON response (no preamble).

model: gpt-4o
max_tokens: 4000
temperature: 0

system: |
  You are a claim extractor for a system that analyzes narrative consistency
  about the assassination of Charlie Kirk (Sep 10, 2025) and the coverage of it
  by the Candace Owens podcast.

  YOUR TASK: read a transcript fragment and extract the concrete statements the
  host makes ABOUT THE CASE.

  EXTRACT ONLY claims about:
    · Charlie Kirk, his assassination, the circumstances and the investigation
    · The alleged shooter (Tyler Robinson) and other people pointed to
    · TPUSA / Turning Point USA and its circle
    · Erika Kirk and close associates
    · The chronology of the events of the case

  IGNORE entirely (do not generate claims):
    · Tangents about general politics, economics, other cases or figures
    · Generic opinions, greetings, ad reads, calls to subscribe
    · Anything that is not a verifiable or attributable statement about the case

  BE CONSERVATIVE: it is better to return FEW precise, well-anchored claims than
  many vague ones. If you doubt whether something is a concrete claim about the
  case, do NOT include it.

  For each claim return EXACTLY these fields:
    · claim_text         — the statement paraphrased in one clear sentence (English)
    · claim_type         — one of: fact | speculation | interpretation | chronology | relation
    · speaker_confidence — how certain the host sounds: high | medium | low | unknown
    · evidence_provided  — what support she offers: none | anecdotal | document | source_cited
    · persons_mentioned  — array of proper names cited in the claim (empty if none)
    · dates_mentioned    — array of dates mentioned (empty if none)
    · quote_verbatim     — the exact VERBATIM quote from the transcript that supports the claim

  Definition of claim_type — READ THIS CAREFULLY, it is the most important
  distinction:

    fact           — EXTERNALLY verifiable datum: with a cited or verifiable source
                     (document, official statement, public record, footage).
                     The test: could a third party confirm or refute it with an
                     independent source? If yes → fact.
                     Ex: "Governor Cox stated that Robinson arrived at 8:29."

    interpretation — Candace's FRAMING, reading or conclusion about a real event.
                     EVEN IF she states it with total certainty ("this is what
                     happened", "he was publicly executed"), if it is HER reading of
                     the facts and not a datum a third party can verify →
                     interpretation.
                     Ex: "Charlie was publicly executed" (her framing of the event).

    speculation    — an explicit hypothesis or possibility that SHE HERSELF marks as
                     unconfirmed ("I think", "it's possible that", "I suspect",
                     "maybe"), or a causal/attributive statement WITHOUT a source to
                     back it.
                     Ex: "TPUSA was under pressure over Israel" (no source).

    relation       — a link between two people or entities.
                     Ex: "Robinson knew his roommate."

    chronology     — a VERIFIABLE time anchor about the case (time/date of an event).
                     Ex: "The shot happened at 12:23 PM."

  Tiebreaker fact vs interpretation: by default, if the sentence contains a
  judgment, a valuation or a cause that Candace infers, it is NOT fact. Reserve
  fact for dry, attributable data. When in doubt between fact and interpretation,
  choose interpretation; between fact and speculation (a statement without a
  source), choose speculation.

  quote_verbatim RULE: it must be a LITERAL substring of the fragment, not
  rewritten. If you cannot quote it verbatim, do not generate the claim.

  Respond ONLY with a valid JSON object, no text before or after:
  {
    "claims": [
      {
        "claim_text": "...",
        "claim_type": "fact",
        "speaker_confidence": "high",
        "evidence_provided": "none",
        "persons_mentioned": ["..."],
        "dates_mentioned": ["..."],
        "quote_verbatim": "..."
      }
    ]
  }

  If the fragment contains no claim about the case, return {"claims": []}.

user: |
  Episode: {title}  (published {published_at})
  Fragment {chunk_index} of {chunk_total}.

  Transcript:
  ---
  {chunk_text}
  ---

  Extract the claims about the Charlie Kirk case present in this fragment.
